## This is for DEV. It runs the Dockerfile with hot reloading

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: imsometa
      POSTGRES_USER: imsometa
      POSTGRES_PASSWORD: imsometa
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imsometa"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy

    volumes:
      - .:/app
      - /app/node_modules

    # ENABLE HOT RELOADING
    command: bun --hot src/index.ts

    ports:
      - "3000:3000"

    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://imsometa:imsometa@postgres:5432/imsometa

volumes:
  postgres_data:
